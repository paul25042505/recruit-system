<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0f172a;color:#e2e8f0;font-family:'Noto Sans TC',sans-serif;}
    #root{min-height:100vh;}
    select option{background:#1e293b;color:#e2e8f0;}

    ::-webkit-scrollbar-track{background:#0f172a;}

    input[type=color]{-webkit-appearance:none;border:none;padding:0;cursor:pointer;}
    input[type=color]::-webkit-color-swatch-wrapper{padding:4px;}
    input[type=color]::-webkit-color-swatch{border-radius:4px;border:none;}
    textarea{font-family:'Noto Sans TC',sans-serif;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="importmap">{"imports":{"react":"https://esm.sh/react@18","react-dom/client":"https://esm.sh/react-dom@18/client"}}</script>
<script type="module">
import React,{useState,useEffect,useCallback,useRef} from "react";
import {createRoot} from "react-dom/client";
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {getFirestore,doc,getDoc,setDoc,updateDoc,deleteDoc,collection,getDocs} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyCwdW1sg-h6SwC71N18s20AO4fQNFo2Mpk",authDomain:"recruitment-sys-cc79d.firebaseapp.com",projectId:"recruitment-sys-cc79d",storageBucket:"recruitment-sys-cc79d.firebasestorage.app",messagingSenderId:"4032432304",appId:"1:4032432304:web:c74e55872bbdb5250d1375"};
const firebaseApp=initializeApp(firebaseConfig);
const db=getFirestore(firebaseApp);

const DEFAULT_STATUS_OPTIONS=[
  {id:1,emoji:"❌",label:"資格不符",color:"#ef4444",subReasons:["酒駕前科","吸毒前科","學歷不符","近三個月就診身心科"],hasNote:true},
  {id:2,emoji:"🚫",label:"無意願",color:"#f97316",subReasons:[],hasNote:true},
  {id:3,emoji:"🟡",label:"低意願",color:"#eab308",subReasons:[],hasNote:true},
  {id:4,emoji:"🔵",label:"中意願",color:"#3b82f6",subReasons:[],hasNote:true},
  {id:5,emoji:"🟢",label:"高意願",color:"#22c55e",subReasons:[],hasNote:true},
  {id:6,emoji:"✅",label:"確簽",color:"#10b981",subReasons:[],hasNote:false},
  {id:7,emoji:"⏳",label:"待確認",color:"#a855f7",subReasons:["刺青","病史"],hasNote:true},
];
const DEFAULT_UNITS=["陸軍","海軍","空軍","海軍陸戰隊","憲兵"];
const DEFAULT_BATTALIONS=["第一營","第二營","第三營","特勤營","後勤營"];
const DEFAULT_COMPANIES=["第一連","第二連","第三連","第四連","支援連"];
const EDUCATIONS=["高中職","專科","大學","研究所","其他"];
const CITIES=["台北市","新北市","桃園市","台中市","台南市","高雄市","基隆市","新竹市","新竹縣","苗栗縣","彰化縣","南投縣","雲林縣","嘉義市","嘉義縣","屏東縣","宜蘭縣","花蓮縣","台東縣","澎湖縣","金門縣","連江縣"];
const FAMILY_STATUS=["雙親","單親（父）","單親（母）","隔代教養","其他"];
const FAMILY_MEMBERS=["祖父","祖母","父親","母親","兄","弟","姐","妹","女友"];
const DEFAULT_SCHEDULE=[
  {label:"接訓",date:""},{label:"營資審",date:""},{label:"旅資審",date:""},
  {label:"意願截止",date:""},{label:"軍團審",date:""},{label:"司令部審",date:""},
  {label:"8週補件截止",date:""},{label:"8週起役",date:""},
  {label:"12週補件截止",date:""},{label:"12週起役",date:""},
];

async function loadSettings(){
  const snap=await getDoc(doc(db,"settings","global"));
  if(snap.exists()){
    const d=snap.data();
    if(!d.battalions)d.battalions=DEFAULT_BATTALIONS;
    if(!d.companies)d.companies=DEFAULT_COMPANIES;
    return d;
  }
  const defaults={adminPassword:"admin1234",statusOptions:DEFAULT_STATUS_OPTIONS,units:DEFAULT_UNITS,battalions:DEFAULT_BATTALIONS,companies:DEFAULT_COMPANIES};
  await setDoc(doc(db,"settings","global"),defaults);
  return defaults;
}
async function saveSettings(patch){await setDoc(doc(db,"settings","global"),patch,{merge:true});}
async function loadBatches(){const snap=await getDocs(collection(db,"batches"));return snap.docs.map(d=>({id:d.id,...d.data()}));}
async function saveBatch(batch){const{id,...data}=batch;await setDoc(doc(db,"batches",id),data);}
async function deleteBatchDoc(id){await deleteDoc(doc(db,"batches",id));}
async function updateBatchInDB(batchId,data){await updateDoc(doc(db,"batches",batchId),data);}

function makeTrainee(batchId,num){
  return{id:`${batchId}-${String(num).padStart(3,"0")}`,seatNo:String(num).padStart(3,"0"),
    name:"",city:"",district:"",education:"",school:"",department:"",
    familyStatus:"",familyMembers:[],girlfriendYears:"",
    workExp:"",salary:"",age:"",phone:"",bloodType:"",height:"",weight:"",
    status:null,statusReasons:[],statusNote:"",
    interviewUnit:"",interviewRank:"",interviewContent:"",
    recruiterNote:"",entryDate:"",batchId};
}

function App(){
  const [view,setView]=useState("loading");
  const [settings,setSettings]=useState(null);
  const [batches,setBatches]=useState([]);
  const [currentBatch,setCurrentBatch]=useState(null);
  const [currentTrainee,setCurrentTrainee]=useState(null);
  const [unlockedBatches,setUnlockedBatches]=useState({});
  const [batchPwdInput,setBatchPwdInput]=useState("");
  const [batchPwdError,setBatchPwdError]=useState(false);
  const [adminPwdInput,setAdminPwdInput]=useState("");
  const [adminPwdError,setAdminPwdError]=useState(false);
  const [showAddBatch,setShowAddBatch]=useState(false);
  const [showSeatMgr,setShowSeatMgr]=useState(false);
  const [newBatch,setNewBatch]=useState({unit:"",battalion:"",company:"",sequence:"",password:"",traineeCount:""});
  const [filterStatus,setFilterStatus]=useState("all");
  const [searchQuery,setSearchQuery]=useState("");
  const [adminTab,setAdminTab]=useState("units");
  const [newUnit,setNewUnit]=useState("");
  const [newBattalion,setNewBattalion]=useState("");
  const [newCompany,setNewCompany]=useState("");
  const [newStatusItem,setNewStatusItem]=useState({emoji:"",label:"",color:"#3b82f6",subReasons:[],hasNote:true});
  const [newAdminPwd,setNewAdminPwd]=useState("");
  const [editPwdVisible,setEditPwdVisible]=useState({});
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState(null);
  const saveTimer=useRef({});

  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),2500);};

  useEffect(()=>{
    (async()=>{
      try{
        const[s,b]=await Promise.all([loadSettings(),loadBatches()]);
        setSettings(s);setBatches(b);setView("home");
      }catch(e){console.error(e);setView("error");}
    })();
  },[]);

  useEffect(()=>{
    if(currentBatch){const u=batches.find(b=>b.id===currentBatch.id);if(u)setCurrentBatch(u);}
  },[batches]);

  const updateSettings=async(patch)=>{setSettings(p=>({...p,...patch}));await saveSettings(patch);};

  const enterBatch=(batch)=>{
    if(unlockedBatches[batch.id]){setCurrentBatch(batch);setView("batch");return;}
    setCurrentBatch(batch);setBatchPwdInput("");setBatchPwdError(false);setView("batchPwd");
  };
  const submitBatchPwd=()=>{
    if(batchPwdInput===currentBatch.password){setUnlockedBatches(p=>({...p,[currentBatch.id]:true}));setView("batch");}
    else setBatchPwdError(true);
  };
  const addBatch=async()=>{
    const count=parseInt(newBatch.traineeCount);
    if(!newBatch.unit||!newBatch.battalion||!newBatch.sequence||!newBatch.password||!count||count<1)return;
    setSaving(true);
    const id=`b_${Date.now()}`;
    const trainees=Array.from({length:count},(_,i)=>makeTrainee(id,i+1));
    const batch={...newBatch,id,createdAt:new Date().toISOString().slice(0,10),trainees,schedule:DEFAULT_SCHEDULE};
    delete batch.traineeCount;
    await saveBatch(batch);setBatches(p=>[...p,batch]);
    setNewBatch({unit:"",battalion:"",company:"",sequence:"",password:"",traineeCount:""});
    setShowAddBatch(false);setSaving(false);showToast("梯次已新增");
  };
  const removeBatch=async(id)=>{await deleteBatchDoc(id);setBatches(p=>p.filter(b=>b.id!==id));showToast("已刪除");};

  // 座號管理
  const addSeat=async()=>{
    const batch=batches.find(b=>b.id===currentBatch.id);
    const maxNum=batch.trainees.reduce((m,t)=>Math.max(m,parseInt(t.seatNo)||0),0);
    const newT=makeTrainee(batch.id,maxNum+1);
    const trainees=[...batch.trainees,newT];
    setBatches(p=>p.map(b=>b.id===batch.id?{...b,trainees}:b));
    await updateBatchInDB(batch.id,{trainees});
    showToast(`已新增座號 ${newT.seatNo}`);
  };
  const removeSeat=async()=>{
    const batch=batches.find(b=>b.id===currentBatch.id);
    if(!batch.trainees.length)return;
    const trainees=batch.trainees.slice(0,-1);
    setBatches(p=>p.map(b=>b.id===batch.id?{...b,trainees}:b));
    await updateBatchInDB(batch.id,{trainees});
    showToast("已刪除最後一筆");
  };

  const updateTrainee=useCallback(async(traineeId,field,value)=>{
    const batch=batches.find(b=>b.id===currentBatch?.id);if(!batch)return;
    const updated=batch.trainees.map(t=>t.id===traineeId?{...t,[field]:value}:t);
    setBatches(p=>p.map(b=>b.id===batch.id?{...b,trainees:updated}:b));
    setCurrentTrainee(p=>p?.id===traineeId?{...p,[field]:value}:p);
    if(saveTimer.current[traineeId])clearTimeout(saveTimer.current[traineeId]);
    saveTimer.current[traineeId]=setTimeout(()=>updateBatchInDB(batch.id,{trainees:updated}),1000);
  },[batches,currentBatch]);

  const updateSchedule=async(idx,value)=>{
    const batch=batches.find(b=>b.id===currentBatch.id);if(!batch)return;
    const schedule=(batch.schedule||DEFAULT_SCHEDULE).map((s,i)=>i===idx?{...s,date:value}:s);
    setBatches(p=>p.map(b=>b.id===batch.id?{...b,schedule}:b));
    await updateBatchInDB(batch.id,{schedule});
  };

  const filteredTrainees=()=>{
    if(!currentBatch)return[];
    let list=currentBatch.trainees||[];
    if(filterStatus!=="all")list=list.filter(t=>t.status===parseInt(filterStatus));
    if(searchQuery)list=list.filter(t=>t.name?.includes(searchQuery)||t.seatNo?.includes(searchQuery)||t.city?.includes(searchQuery));
    return list;
  };

  const getStatus=id=>settings?.statusOptions?.find(s=>s.id===id);
  const batchStats=batch=>{
    const tr=batch.trainees||[];
    return{total:tr.length,reviewed:tr.filter(t=>t.status!=null).length,confirmed:tr.filter(t=>getStatus(t.status)?.label==="確簽").length};
  };

  const submitAdminPwd=()=>{
    if(adminPwdInput===settings?.adminPassword){setView("admin");setAdminPwdInput("");setAdminPwdError(false);}
    else setAdminPwdError(true);
  };
  const addUnit=async()=>{if(!newUnit.trim())return;await updateSettings({units:[...(settings.units||[]),newUnit.trim()]});setNewUnit("");showToast("已新增");};
  const removeUnit=async(u)=>{await updateSettings({units:settings.units.filter(x=>x!==u)});showToast("已刪除");};
  const addBattalion=async()=>{if(!newBattalion.trim())return;await updateSettings({battalions:[...(settings.battalions||[]),newBattalion.trim()]});setNewBattalion("");showToast("已新增");};
  const removeBattalion=async(u)=>{await updateSettings({battalions:settings.battalions.filter(x=>x!==u)});showToast("已刪除");};
  const addCompany=async()=>{if(!newCompany.trim())return;await updateSettings({companies:[...(settings.companies||[]),newCompany.trim()]});setNewCompany("");showToast("已新增");};
  const removeCompany=async(u)=>{await updateSettings({companies:settings.companies.filter(x=>x!==u)});showToast("已刪除");};
  const addStatusOption=async()=>{
    if(!newStatusItem.emoji||!newStatusItem.label)return;
    const statusOptions=[...(settings.statusOptions||[]),{...newStatusItem,id:Date.now()}];
    await updateSettings({statusOptions});setNewStatusItem({emoji:"",label:"",color:"#3b82f6",subReasons:[],hasNote:true});showToast("已新增");
  };
  const removeStatusOption=async(id)=>{await updateSettings({statusOptions:settings.statusOptions.filter(s=>s.id!==id)});showToast("已刪除");};
  const updateAdminPwd=async()=>{if(!newAdminPwd)return;await updateSettings({adminPassword:newAdminPwd});setNewAdminPwd("");showToast("密碼已更新");};
  const saveBatchPwd=async(b)=>{await updateDoc(doc(db,"batches",b.id),{password:b.password});showToast("已儲存");};

  const S={
    app:{fontFamily:"'Noto Sans TC',sans-serif",minHeight:"100vh",background:"#0f172a",color:"#e2e8f0"},
    hdr:{background:"linear-gradient(135deg,#1e293b,#0f172a)",borderBottom:"1px solid #334155",padding:"12px 16px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100},
    logo:{width:36,height:36,background:"linear-gradient(135deg,#f59e0b,#ef4444)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0},
    btn:(v="default",sz="md")=>({padding:sz==="sm"?"5px 10px":"8px 16px",fontSize:sz==="sm"?11:13,fontWeight:600,borderRadius:8,border:"none",cursor:"pointer",
      background:v==="primary"?"linear-gradient(135deg,#f59e0b,#ef4444)":v==="danger"?"#ef4444":v==="ghost"?"transparent":"#1e293b",
      color:v==="primary"||v==="danger"?"#fff":v==="ghost"?"#94a3b8":"#e2e8f0",
      outline:v==="ghost"?"1px solid #334155":"none"}),
    card:{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:16,marginBottom:10},
    inp:{background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:"8px 12px",color:"#e2e8f0",fontSize:13,width:"100%",outline:"none",boxSizing:"border-box"},
    sel:{background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:"8px 12px",color:"#e2e8f0",fontSize:13,width:"100%",outline:"none"},
    tag:c=>({background:`${c}22`,color:c,border:`1px solid ${c}55`,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600}),
    badge:{background:"#334155",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#94a3b8"},
    sec:{padding:"14px 14px 120px"},
    lbl:{fontSize:11,color:"#94a3b8",marginBottom:4,display:"block",fontWeight:600,letterSpacing:"0.05em"},
    divider:{border:"none",borderTop:"1px solid #334155",margin:"14px 0"},
    sBar:{position:"fixed",bottom:0,left:0,right:0,background:"#1e293b",borderTop:"1px solid #334155",padding:"10px 14px",zIndex:99},
    modal:{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"flex-end",zIndex:200},
    mBox:{background:"#1e293b",borderRadius:"16px 16px 0 0",padding:22,width:"100%",maxHeight:"88vh",overflowY:"auto"},
    center:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24},
    toast:t=>({position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:t==="ok"?"#10b981":"#ef4444",color:"#fff",borderRadius:10,padding:"10px 20px",fontSize:13,fontWeight:600,zIndex:999,whiteSpace:"nowrap"}),
  };
  const e=React.createElement;
  const Toast=()=>toast?e("div",{style:S.toast(toast.type)},toast.msg):null;

  if(view==="loading")return e("div",{style:{...S.app,...S.center}},e("div",{style:{fontSize:48,marginBottom:16}},"🎖️"),e("div",{style:{color:"#94a3b8",fontSize:16}},"連線中…"));
  if(view==="error")return e("div",{style:{...S.app,...S.center}},e("div",{style:{fontSize:40,marginBottom:12}},"⚠️"),e("div",{style:{color:"#ef4444",textAlign:"center"}},"無法連線，請重新整理"));

  // ══ HOME ══════════════════════════════════════════════════════════════════
  if(view==="home")return e("div",{style:S.app},
    e(Toast),
    e("div",{style:S.hdr},
      e("div",{style:S.logo},"🎖️"),
      e("div",null,
        e("div",{style:{fontSize:16,fontWeight:700,color:"#f8fafc",letterSpacing:"0.05em"}},"招募訓員管理系統"),
        e("div",{style:{fontSize:11,color:"#94a3b8"}},"RECRUITMENT MANAGEMENT SYSTEM")
      ),
      e("button",{style:{...S.btn("ghost","sm"),marginLeft:"auto"},onClick:()=>{setView("adminPwd");setAdminPwdInput("");setAdminPwdError(false);}},"⚙️ 後台")
    ),
    e("div",{style:S.sec},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        e("div",null,
          e("div",{style:{fontSize:17,fontWeight:700,color:"#f8fafc"}},"梯次列表"),
          e("div",{style:{fontSize:12,color:"#64748b",marginTop:2}},`共 ${batches.length} 個梯次`)
        ),
        e("button",{style:S.btn("primary","sm"),onClick:()=>setShowAddBatch(true)},"＋ 新增梯次")
      ),
      ...batches.map(batch=>{
        const st=batchStats(batch),pct=st.total?Math.round(st.reviewed/st.total*100):0;
        return e("div",{key:batch.id,style:{...S.card,cursor:"pointer"},onClick:()=>enterBatch(batch)},
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
            e("div",null,
              e("div",{style:{fontSize:15,fontWeight:700,color:"#f8fafc",marginBottom:5}},`${batch.unit} · ${batch.battalion}${batch.company?" · "+batch.company:""} · ${batch.sequence}`),
              e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
                e("span",{style:S.badge},`建立 ${batch.createdAt}`),
                e("span",{style:S.badge},`訓員 ${st.total} 人`),
                e("span",{style:S.tag("#22c55e")},`確簽 ${st.confirmed} 人`)
              )
            ),
            e("span",{style:{color:"#475569",fontSize:20}},"›")
          ),
          e("div",{style:{marginTop:12}},
            e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
              e("span",{style:{fontSize:11,color:"#64748b"}},"訪談進度"),
              e("span",{style:{fontSize:11,color:"#94a3b8"}},`${st.reviewed}/${st.total}`)
            ),
            e("div",{style:{height:4,background:"#334155",borderRadius:4,overflow:"hidden"}},
              e("div",{style:{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#f59e0b,#ef4444)",borderRadius:4}})
            )
          )
        );
      }),
      batches.length===0&&e("div",{style:{textAlign:"center",color:"#475569",padding:40}},e("div",{style:{fontSize:40,marginBottom:8}},"📋"),"尚無梯次")
    ),
    // 新增梯次 Modal
    showAddBatch&&e("div",{style:S.modal},
      e("div",{style:S.mBox},
        e("div",{style:{fontSize:16,fontWeight:700,marginBottom:18,color:"#f8fafc"}},"新增梯次"),
        ...[["接訓單位","unit",settings?.units||[]],["營","battalion",settings?.battalions||[]],["連","company",settings?.companies||[]]].map(([lbl,key,opts])=>
          e("div",{key,style:{marginBottom:12}},
            e("label",{style:S.lbl},lbl),
            e("select",{style:S.sel,value:newBatch[key],onChange:ev=>setNewBatch(p=>({...p,[key]:ev.target.value}))},
              e("option",{value:""},"請選擇"),...opts.map(o=>e("option",{key:o},o))
            )
          )
        ),
        e("div",{style:{marginBottom:12}},e("label",{style:S.lbl},"梯次"),e("input",{style:S.inp,placeholder:"請填寫梯次",value:newBatch.sequence,onChange:ev=>setNewBatch(p=>({...p,sequence:ev.target.value}))})),
        e("div",{style:{marginBottom:12}},e("label",{style:S.lbl},"本次訓員人數"),e("input",{style:S.inp,type:"number",placeholder:"例：30",min:"1",value:newBatch.traineeCount,onChange:ev=>setNewBatch(p=>({...p,traineeCount:ev.target.value}))})),
        e("div",{style:{marginBottom:18}},e("label",{style:S.lbl},"專案密碼"),e("input",{style:S.inp,type:"password",placeholder:"設定此梯次密碼",value:newBatch.password,onChange:ev=>setNewBatch(p=>({...p,password:ev.target.value}))})),
        e("div",{style:{display:"flex",gap:10}},
          e("button",{style:{...S.btn("ghost"),flex:1},onClick:()=>setShowAddBatch(false)},"取消"),
          e("button",{style:{...S.btn("primary"),flex:1},onClick:addBatch,disabled:saving},saving?"儲存中…":"新增")
        )
      )
    )
  );

  // ══ BATCH PASSWORD ════════════════════════════════════════════════════════
  if(view==="batchPwd")return e("div",{style:{...S.app,...S.center}},
    e("div",{style:{width:"100%",maxWidth:360}},
      e("div",{style:{textAlign:"center",marginBottom:28}},
        e("div",{style:{fontSize:44,marginBottom:10}},"🔒"),
        e("div",{style:{fontSize:17,fontWeight:700,color:"#f8fafc"}},"輸入專案密碼"),
        e("div",{style:{fontSize:12,color:"#64748b",marginTop:6}},`${currentBatch?.unit} · ${currentBatch?.battalion}${currentBatch?.company?" · "+currentBatch.company:""} · ${currentBatch?.sequence}`)
      ),
      e("input",{style:{...S.inp,textAlign:"center",fontSize:20,letterSpacing:"0.2em",marginBottom:10,padding:14},type:"password",placeholder:"••••••",value:batchPwdInput,autoFocus:true,
        onChange:ev=>{setBatchPwdInput(ev.target.value);setBatchPwdError(false);},
        onKeyDown:ev=>ev.key==="Enter"&&submitBatchPwd()}),
      batchPwdError&&e("div",{style:{textAlign:"center",color:"#ef4444",fontSize:13,marginBottom:10}},"密碼錯誤，請重試"),
      e("button",{style:{...S.btn("primary"),width:"100%",padding:12},onClick:submitBatchPwd},"進入"),
      e("button",{style:{...S.btn("ghost"),width:"100%",marginTop:8,padding:10},onClick:()=>setView("home")},"← 返回")
    )
  );

  // ══ BATCH LIST ════════════════════════════════════════════════════════════
  if(view==="batch"){
    const list=filteredTrainees();
    const schedule=currentBatch?.schedule||DEFAULT_SCHEDULE;
    const curTrainees=currentBatch?.trainees||[];
    return e("div",{style:S.app},
      e(Toast),
      e("div",{style:S.hdr},
        e("button",{style:{...S.btn("ghost","sm"),padding:"5px 8px"},onClick:()=>setView("home")},"←"),
        e("div",{style:{flex:1,minWidth:0}},
          e("div",{style:{fontSize:14,fontWeight:700,color:"#f8fafc",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},
            `${currentBatch?.unit} · ${currentBatch?.battalion}${currentBatch?.company?" · "+currentBatch.company:""} · ${currentBatch?.sequence}`),
          e("div",{style:{fontSize:11,color:"#94a3b8"}},`共 ${curTrainees.length} 人`)
        ),
        e("button",{style:{...S.btn("ghost","sm"),flexShrink:0},onClick:()=>setShowSeatMgr(true)},"🪑 管理座號")
      ),
      e("div",{style:{...S.sec,paddingTop:14}},
        // 期程表
        e("div",{style:{...S.card,marginBottom:14}},
          e("div",{style:{fontSize:12,fontWeight:700,color:"#f59e0b",letterSpacing:"0.1em",marginBottom:12}},"▍ 梯次期程"),
          e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 10px"}},
            ...schedule.map((s,i)=>
              e("div",{key:i},
                e("label",{style:{...S.lbl,marginBottom:2}},s.label),
                e("input",{style:{...S.inp,fontSize:12},type:"date",value:s.date||"",onChange:ev=>updateSchedule(i,ev.target.value)})
              )
            )
          )
        ),
        // 搜尋
        e("input",{style:{...S.inp,marginBottom:8},placeholder:"🔍 搜尋姓名、座號…",value:searchQuery,onChange:ev=>setSearchQuery(ev.target.value)}),
        // 篩選
        e("div",{style:{display:"flex",gap:6,overflowX:"auto",paddingBottom:10}},
          e("button",{style:{...S.btn(filterStatus==="all"?"primary":"ghost","sm"),flexShrink:0},onClick:()=>setFilterStatus("all")},"全部"),
          ...(settings?.statusOptions||[]).map(s=>
            e("button",{key:s.id,style:{...S.btn(filterStatus===String(s.id)?"primary":"ghost","sm"),flexShrink:0,color:filterStatus===String(s.id)?"#fff":s.color},
              onClick:()=>setFilterStatus(String(s.id))},`${s.emoji} ${s.label}`)
          )
        ),
        // 訓員列表
        ...list.map(t=>{
          const si=t.status?getStatus(t.status):null;
          return e("div",{key:t.id,style:{...S.card,padding:"12px 14px",cursor:"pointer"},onClick:()=>{setCurrentTrainee(t);setView("trainee");}},
            e("div",{style:{display:"flex",alignItems:"center",gap:10}},
              e("div",{style:{background:"#334155",borderRadius:8,padding:"5px 9px",fontSize:13,fontWeight:700,color:"#94a3b8",flexShrink:0}},t.seatNo),
              e("div",{style:{flex:1,minWidth:0}},
                e("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
                  e("span",{style:{fontSize:15,fontWeight:700,color:t.name?"#f8fafc":"#475569"}},t.name||"（未填姓名）"),
                  si&&e("span",{style:S.tag(si.color)},`${si.emoji} ${si.label}`)
                ),
                e("div",{style:{fontSize:12,color:"#64748b",marginTop:2}},
                  [t.city,t.district,t.education,t.department].filter(Boolean).join(" · ")||"尚未填寫資料")
              ),
              e("span",{style:{color:"#475569"}},"›")
            ),
            (t.statusNote||(t.statusReasons&&t.statusReasons.length>0))&&e("div",{style:{marginTop:8,fontSize:11,color:"#64748b",background:"#0f172a",borderRadius:6,padding:"5px 10px",borderLeft:`3px solid ${si?.color||"#334155"}`}},
              [t.statusReasons?.join("、"),t.statusNote].filter(Boolean).join("　").slice(0,60)
            )
          );
        }),
        list.length===0&&e("div",{style:{textAlign:"center",color:"#475569",padding:40}},e("div",{style:{fontSize:36,marginBottom:8}},"🔍"),"找不到符合條件的訓員")
      ),
      // 管理座號 Modal
      showSeatMgr&&e("div",{style:S.modal},
        e("div",{style:{...S.mBox,maxHeight:"50vh"}},
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
            e("div",{style:{fontSize:16,fontWeight:700,color:"#f8fafc"}},"管理座號"),
            e("button",{style:{...S.btn("ghost","sm")},onClick:()=>setShowSeatMgr(false)},"✕")
          ),
          e("div",{style:{textAlign:"center",marginBottom:20}},
            e("div",{style:{fontSize:32,fontWeight:700,color:"#f8fafc",marginBottom:4}},curTrainees.length),
            e("div",{style:{fontSize:12,color:"#64748b"}},"目前訓員人數"),
            curTrainees.length>0&&e("div",{style:{fontSize:11,color:"#94a3b8",marginTop:4}},
              `座號 001 ～ ${curTrainees[curTrainees.length-1]?.seatNo}`)
          ),
          e("div",{style:{display:"flex",gap:10}},
            e("button",{style:{...S.btn("primary"),flex:1,padding:14,fontSize:15},onClick:async()=>{await addSeat();}},
              "＋ 新增一筆座號"),
            e("button",{style:{...S.btn("danger"),flex:1,padding:14,fontSize:15},onClick:async()=>{await removeSeat();}},
              "－ 刪除最後一筆")
          )
        )
      )
    );
  }

  // ══ TRAINEE DETAIL ════════════════════════════════════════════════════════
  if(view==="trainee"&&currentTrainee){
    const t=currentTrainee,si=t.status?getStatus(t.status):null;
    const upd=(f,v)=>updateTrainee(t.id,f,v);

    const Inp=(label,field,type="text",opts,span2)=>
      e("div",{style:{marginBottom:12,gridColumn:span2?"span 2":"span 1"}},
        e("label",{style:S.lbl},label),
        opts
          ?e("select",{style:S.sel,value:t[field]||"",onChange:ev=>upd(field,ev.target.value)},
              e("option",{value:""},"請選擇"),...opts.map(o=>e("option",{key:o},o)))
          :type==="textarea"
            ?e("textarea",{style:{...S.inp,minHeight:72,resize:"vertical"},value:t[field]||"",onChange:ev=>upd(field,ev.target.value)})
            :e("input",{style:S.inp,type,value:t[field]||"",onChange:ev=>upd(field,ev.target.value)})
      );

    const FamilyMembers=()=>e("div",{style:{marginBottom:12,gridColumn:"span 2"}},
      e("label",{style:S.lbl},"家庭成員"),
      e("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:6}},
        ...FAMILY_MEMBERS.map(m=>e("label",{key:m,style:{display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:12,
          color:"#e2e8f0",background:"#0f172a",border:`1px solid ${(t.familyMembers||[]).includes(m)?"#f59e0b":"#334155"}`,borderRadius:6,padding:"4px 8px"}},
          e("input",{type:"checkbox",checked:(t.familyMembers||[]).includes(m),
            onChange:ev=>{const arr=t.familyMembers||[];upd("familyMembers",ev.target.checked?[...arr,m]:arr.filter(x=>x!==m));},
            style:{accentColor:"#f59e0b"}}),m
        )),
        (t.familyMembers||[]).includes("女友")&&e("input",{key:"gf",style:{...S.inp,width:130,fontSize:12},
          placeholder:"交往幾年",value:t.girlfriendYears||"",onChange:ev=>upd("girlfriendYears",ev.target.value)})
      )
    );

    const StatusSection=()=>{
      const si2=t.status?getStatus(t.status):null;
      const subReasons=si2?.subReasons||[];
      const hasContent=subReasons.length>0||si2?.hasNote;
      return e("div",{style:{...S.sBar,paddingBottom:16}},
        e("div",{style:{fontSize:11,color:"#64748b",marginBottom:6,fontWeight:600}},"意願評估"),
        e("div",{style:{display:"flex",gap:5,overflowX:"auto",marginBottom:hasContent?8:0}},
          ...(settings?.statusOptions||[]).map(s=>
            e("button",{key:s.id,onClick:()=>upd("status",t.status===s.id?null:s.id),
              style:{flexShrink:0,padding:"6px 9px",borderRadius:10,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
                background:t.status===s.id?s.color:"#0f172a",color:t.status===s.id?"#fff":s.color,
                outline:t.status===s.id?"none":`1px solid ${s.color}44`}},`${s.emoji} ${s.label}`)
          )
        ),
        subReasons.length>0&&e("div",{style:{display:"flex",flexWrap:"wrap",gap:4,marginBottom:si2?.hasNote?6:0}},
          ...subReasons.map(r=>e("label",{key:r,style:{display:"flex",alignItems:"center",gap:3,cursor:"pointer",fontSize:11,
            color:"#e2e8f0",background:"#0f172a",border:`1px solid ${(t.statusReasons||[]).includes(r)?si2.color:"#334155"}`,borderRadius:6,padding:"3px 7px"}},
            e("input",{type:"checkbox",checked:(t.statusReasons||[]).includes(r),
              onChange:ev=>{const arr=t.statusReasons||[];upd("statusReasons",ev.target.checked?[...arr,r]:arr.filter(x=>x!==r));},
              style:{accentColor:si2.color}}),r
          ))
        ),
        si2?.hasNote&&e("input",{style:{...S.inp,fontSize:12},placeholder:"手打備註原因…",value:t.statusNote||"",onChange:ev=>upd("statusNote",ev.target.value)})
      );
    };

    return e("div",{style:S.app},
      e(Toast),
      e("div",{style:S.hdr},
        e("button",{style:{...S.btn("ghost","sm"),padding:"5px 8px"},onClick:()=>setView("batch")},"←"),
        e("div",null,
          e("div",{style:{fontSize:16,fontWeight:700,color:"#f8fafc"}},`${t.seatNo}${t.name?" · "+t.name:""}`),
          e("div",{style:{fontSize:11,color:"#94a3b8"}},si?`${si.emoji} ${si.label}`:"尚未評估")
        )
      ),
      e("div",{style:{...S.sec,paddingBottom:210}},
        e("div",{style:S.card},
          e("div",{style:{fontSize:11,fontWeight:700,color:"#f59e0b",letterSpacing:"0.1em",marginBottom:12}},"▍ 基本資料"),
          e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}},
            Inp("姓名","name","text",null,true),
            Inp("年齡","age","number"),Inp("血型","bloodType","text",["A","B","O","AB"]),
            Inp("居住地（縣市）","city","text",CITIES),Inp("鄉鎮市區","district"),
            Inp("學歷","education","text",EDUCATIONS),Inp("就讀學校","school"),
            Inp("就讀科系","department"),Inp("工作經驗","workExp"),
            Inp("薪資待遇","salary"),
            Inp("身高(cm)","height","number"),Inp("體重(kg)","weight","number"),
            Inp("聯絡電話","phone","tel",null,true),
            Inp("入伍日期","entryDate","date",null,true)
          )
        ),
        e("div",{style:S.card},
          e("div",{style:{fontSize:11,fontWeight:700,color:"#f59e0b",letterSpacing:"0.1em",marginBottom:12}},"▍ 家庭狀況"),
          e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}},
            Inp("家庭狀況","familyStatus","text",FAMILY_STATUS,true),
            FamilyMembers()
          )
        ),
        e("div",{style:S.card},
          e("div",{style:{fontSize:11,fontWeight:700,color:"#f59e0b",letterSpacing:"0.1em",marginBottom:12}},"▍ 訪談紀錄"),
          e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}},
            Inp("招募員單位","interviewUnit","text",null,false),
            Inp("級職姓名","interviewRank","text",null,false),
            Inp("訪談內容","interviewContent","textarea",null,true),
            Inp("其他備注","recruiterNote","textarea",null,true)
          )
        )
      ),
      e(StatusSection)
    );
  }

  // ══ ADMIN PASSWORD ════════════════════════════════════════════════════════
  if(view==="adminPwd")return e("div",{style:{...S.app,...S.center}},
    e("div",{style:{width:"100%",maxWidth:360}},
      e("div",{style:{textAlign:"center",marginBottom:28}},
        e("div",{style:{fontSize:44,marginBottom:10}},"🛡️"),
        e("div",{style:{fontSize:17,fontWeight:700,color:"#f8fafc"}},"管理員登入"),
        e("div",{style:{fontSize:12,color:"#64748b",marginTop:6}},"請輸入管理員密碼")
      ),
      e("input",{style:{...S.inp,textAlign:"center",fontSize:20,letterSpacing:"0.2em",marginBottom:10,padding:14},
        type:"password",placeholder:"••••••",value:adminPwdInput,autoFocus:true,
        onChange:ev=>{setAdminPwdInput(ev.target.value);setAdminPwdError(false);},
        onKeyDown:ev=>ev.key==="Enter"&&submitAdminPwd()}),
      adminPwdError&&e("div",{style:{textAlign:"center",color:"#ef4444",fontSize:13,marginBottom:10}},"密碼錯誤"),
      e("button",{style:{...S.btn("primary"),width:"100%",padding:12},onClick:submitAdminPwd},"進入後台"),
      e("button",{style:{...S.btn("ghost"),width:"100%",marginTop:8,padding:10},onClick:()=>setView("home")},"← 返回")
    )
  );

  // ══ ADMIN PANEL ═══════════════════════════════════════════════════════════
  if(view==="admin"){
    const ListMgr=(items,onRemove,onAdd,val,setVal,placeholder,icon)=>e("div",null,
      ...items.map(u=>e("div",{key:u,style:{...S.card,padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
        e("span",{style:{fontSize:14,fontWeight:600,color:"#f8fafc"}},`${icon} ${u}`),
        e("button",{style:S.btn("danger","sm"),onClick:()=>onRemove(u)},"刪除")
      )),
      e("hr",{style:S.divider}),
      e("div",{style:S.card},
        e("div",{style:{display:"flex",gap:8}},
          e("input",{style:{...S.inp,flex:1},placeholder,value:val,onChange:ev=>setVal(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&onAdd()}),
          e("button",{style:{...S.btn("primary","sm"),flexShrink:0},onClick:onAdd},"新增")
        )
      )
    );
    return e("div",{style:S.app},
      e(Toast),
      e("div",{style:S.hdr},
        e("button",{style:{...S.btn("ghost","sm"),padding:"5px 8px"},onClick:()=>setView("home")},"←"),
        e("div",null,e("div",{style:{fontSize:16,fontWeight:700,color:"#f8fafc"}},"系統後台"),e("div",{style:{fontSize:11,color:"#94a3b8"}},"ADMIN PANEL"))
      ),
      e("div",{style:{display:"flex",borderBottom:"1px solid #334155",padding:"0 14px",overflowX:"auto"}},
        ...[["units","🏢 單位"],["battalions","🪖 營"],["companies","🏠 連"],["batches","📋 梯次"],["status","🏷️ 意願"],["security","🔐 安全"]].map(([k,l])=>
          e("button",{key:k,onClick:()=>setAdminTab(k),style:{...S.btn("ghost","sm"),borderRadius:0,padding:"12px 8px",flexShrink:0,
            borderBottom:adminTab===k?"2px solid #f59e0b":"2px solid transparent",color:adminTab===k?"#f59e0b":"#64748b"}},l)
        )
      ),
      e("div",{style:S.sec},
        adminTab==="units"&&e("div",null,e("div",{style:{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:12}},"接訓單位管理"),ListMgr(settings?.units||[],removeUnit,addUnit,newUnit,setNewUnit,"輸入單位名稱","🏢")),
        adminTab==="battalions"&&e("div",null,e("div",{style:{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:12}},"營管理"),ListMgr(settings?.battalions||[],removeBattalion,addBattalion,newBattalion,setNewBattalion,"輸入營名稱","🪖")),
        adminTab==="companies"&&e("div",null,e("div",{style:{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:12}},"連管理"),ListMgr(settings?.companies||[],removeCompany,addCompany,newCompany,setNewCompany,"輸入連名稱","🏠")),
        adminTab==="batches"&&e("div",null,
          e("div",{style:{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:12}},"梯次密碼管理"),
          ...batches.map(b=>e("div",{key:b.id,style:S.card},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
              e("div",{style:{fontSize:13,fontWeight:700,color:"#f8fafc"}},`${b.unit} · ${b.battalion}${b.company?" · "+b.company:""} · ${b.sequence}`),
              e("button",{style:S.btn("danger","sm"),onClick:()=>removeBatch(b.id)},"刪除")
            ),
            e("div",{style:{display:"flex",gap:8}},
              e("input",{style:S.inp,type:editPwdVisible[b.id]?"text":"password",value:b.password,
                onChange:ev=>setBatches(p=>p.map(x=>x.id===b.id?{...x,password:ev.target.value}:x))}),
              e("button",{style:{...S.btn("ghost","sm"),flexShrink:0},onClick:()=>setEditPwdVisible(p=>({...p,[b.id]:!p[b.id]}))},editPwdVisible[b.id]?"隱藏":"顯示"),
              e("button",{style:{...S.btn("primary","sm"),flexShrink:0},onClick:()=>saveBatchPwd(b)},"儲存")
            )
          ))
        ),
        adminTab==="status"&&e("div",null,
          e("div",{style:{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:12}},"意願評估選項"),
          ...(settings?.statusOptions||[]).map(s=>e("div",{key:s.id,style:{...S.card,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}},
            e("div",{style:{fontSize:20,width:28}},s.emoji),
            e("div",{style:{flex:1}},
              e("div",{style:{fontSize:14,fontWeight:700,color:"#f8fafc"}},s.label),
              s.subReasons?.length>0&&e("div",{style:{fontSize:11,color:"#64748b",marginTop:2}},s.subReasons.join("、"))
            ),
            e("button",{style:S.btn("danger","sm"),onClick:()=>removeStatusOption(s.id)},"刪除")
          )),
          e("hr",{style:S.divider}),
          e("div",{style:S.card},
            e("div",{style:{fontSize:13,fontWeight:700,color:"#f8fafc",marginBottom:12}},"新增選項"),
            e("div",{style:{display:"grid",gridTemplateColumns:"1fr 2fr 1fr",gap:8,marginBottom:10}},
              e("div",null,e("label",{style:S.lbl},"Emoji"),e("input",{style:S.inp,placeholder:"😊",value:newStatusItem.emoji,onChange:ev=>setNewStatusItem(p=>({...p,emoji:ev.target.value}))})),
              e("div",null,e("label",{style:S.lbl},"名稱"),e("input",{style:S.inp,placeholder:"觀察中",value:newStatusItem.label,onChange:ev=>setNewStatusItem(p=>({...p,label:ev.target.value}))})),
              e("div",null,e("label",{style:S.lbl},"顏色"),e("input",{style:{...S.inp,padding:"6px 8px",cursor:"pointer"},type:"color",value:newStatusItem.color,onChange:ev=>setNewStatusItem(p=>({...p,color:ev.target.value}))}))
            ),
            e("button",{style:{...S.btn("primary"),width:"100%"},onClick:addStatusOption},"新增選項")
          )
        ),
        adminTab==="security"&&e("div",null,
          e("div",{style:{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:12}},"安全設定"),
          e("div",{style:S.card},
            e("div",{style:{fontSize:13,fontWeight:700,color:"#f8fafc",marginBottom:12}},"更改管理員密碼"),
            e("input",{style:{...S.inp,marginBottom:10},type:"password",placeholder:"輸入新密碼",value:newAdminPwd,onChange:ev=>setNewAdminPwd(ev.target.value)}),
            e("button",{style:{...S.btn("primary"),width:"100%"},onClick:updateAdminPwd},"更新密碼")
          )
        )
      )
    );
  }
  return null;
}
createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
